<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍰 마들렌 베이킹 시뮬레이션</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --pink:#ffb3c6;--pink-d:#ff85a1;--yellow:#ffe066;--yellow-d:#ffcc00;
  --mint:#b5ead7;--mint-d:#6fcf97;--cream:#fff9f0;--brown:#6d4c41;
  --bg1:#fde8f5;--bg2:#e8f4ff;--bg3:#e8fff5;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Jua',sans-serif}
body{background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));display:flex;flex-direction:column}

/* ── HEADER ── */
#hdr{
  height:60px;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:linear-gradient(90deg,#ffb3c6,#ffe066,#b5ead7);
  border-bottom:4px solid #ff85a1;
  box-shadow:0 3px 0 #c0a080;flex-shrink:0;
}
#hdr .title{font-size:1.25rem;color:#6d4c41;text-shadow:2px 2px 0 rgba(255,255,255,.7)}
#hdr .steps{display:flex;gap:6px}
.step-dot{
  width:32px;height:32px;border-radius:50%;border:3px solid #fff;
  display:flex;align-items:center;justify-content:center;font-size:.75rem;
  background:#ddd;color:#999;cursor:default;transition:all .4s;
  box-shadow:2px 2px 0 rgba(0,0,0,.15);
}
.step-dot.done{background:#6fcf97;color:#fff}
.step-dot.active{background:#ff85a1;color:#fff;transform:scale(1.15);animation:step-pulse 1s ease-in-out infinite}
@keyframes step-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,133,161,.5)}50%{box-shadow:0 0 0 6px rgba(255,133,161,0)}}

/* ── MAIN SCENE ── */
#scene{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

/* ── STAGE (each step) ── */
.stage{position:absolute;inset:0;display:none;align-items:center;justify-content:center;gap:40px;padding:20px}
.stage.active{display:flex}

/* ── INSTRUCTION BOX ── */
#instr{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.92);border:3px solid var(--pink-d);
  border-radius:16px;padding:8px 22px;font-size:.85rem;color:var(--brown);
  box-shadow:3px 3px 0 var(--pink-d);white-space:nowrap;
  pointer-events:none;z-index:50;
  animation:float-instr 2s ease-in-out infinite;
}
@keyframes float-instr{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}

/* ── PARTICLE CANVAS ── */
#fx-canvas{position:absolute;inset:0;pointer-events:none;z-index:30}

/* ── COMMON CARD ── */
.card{
  background:rgba(255,255,255,.85);border:3px solid var(--brown);
  border-radius:16px;padding:20px;
  box-shadow:4px 4px 0 var(--brown),6px 6px 0 rgba(0,0,0,.08);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}

/* ══════════════════════════════
   STEP 1 – FLOUR
══════════════════════════════ */
#bag-wrap{cursor:grab;user-select:none;transition:transform .15s}
#bag-wrap:active{cursor:grabbing}
#bag-wrap.tilting{animation:tilt-bag .6s ease forwards}
@keyframes tilt-bag{0%{transform:rotate(0)}40%{transform:rotate(-60deg) translate(10px,-20px)}100%{transform:rotate(-75deg) translate(20px,-30px)}}
#bag-wrap.resetting{animation:reset-bag .5s ease forwards}
@keyframes reset-bag{from{transform:rotate(-75deg) translate(20px,-30px)}to{transform:rotate(0)}}

#s1-bowl{position:relative;cursor:pointer}
#flour-fill{transition:d .4s ease,fill .4s}

/* ══════════════════════════════
   STEP 2 – EGG
══════════════════════════════ */
#egg-wrap{cursor:pointer;filter:drop-shadow(2px 4px 4px rgba(0,0,0,.2))}
#egg-crack-line{opacity:0;transition:opacity .3s}
#yolk-group{opacity:0;transform:translateY(-40px);transition:opacity .5s,transform .8s}

/* ══════════════════════════════
   STEP 3 – BUTTER MELT
══════════════════════════════ */
#thermo-fill{transition:height .05s linear,y .05s linear,fill .2s}
#butter-solid{transition:opacity .6s}
#butter-liquid{opacity:0;transition:opacity .6s}
#temp-label{font-size:1.1rem;font-weight:900;color:var(--brown);text-align:center}
#heat-btn{
  padding:10px 28px;border:3px solid var(--brown);border-radius:10px;
  background:linear-gradient(135deg,#ff9a56,#ff6b35);
  color:#fff;font-family:'Jua',sans-serif;font-size:1rem;
  cursor:pointer;box-shadow:3px 3px 0 var(--brown);transition:all .15s;
}
#heat-btn:hover{transform:translateY(-2px);box-shadow:3px 5px 0 var(--brown)}
#heat-btn:active{transform:translateY(2px);box-shadow:1px 1px 0 var(--brown)}
#heat-btn:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:2px 2px 0 #aaa}

/* ══════════════════════════════
   STEP 4 – WHISK
══════════════════════════════ */
#whisk-svg{cursor:grab;user-select:none;filter:drop-shadow(2px 3px 3px rgba(0,0,0,.2))}
#whisk-svg:active{cursor:grabbing}
#whisk-svg.spinning{animation:whisk-spin .18s linear infinite}
@keyframes whisk-spin{from{transform-origin:50% 15%;transform:rotate(-12deg)}to{transform-origin:50% 15%;transform:rotate(12deg)}}
#mix-progress-bar{
  width:200px;height:18px;border:3px solid var(--brown);border-radius:20px;
  overflow:hidden;background:#f0e8d0;
}
#mix-fill{height:100%;width:0%;background:linear-gradient(90deg,#ffcc00,#ff85a1);transition:width .1s}

/* ══════════════════════════════
   STEP 5 – PIPING
══════════════════════════════ */
#piping-scene{position:relative}
#piping-bag-el{position:absolute;cursor:crosshair;pointer-events:none;transition:left .05s,top .05s;z-index:10}
#madeleine-pan{cursor:crosshair}
.pan-cavity{transition:fill .3s}

/* ══════════════════════════════
   STEP 6 – OVEN
══════════════════════════════ */
#oven-door{transition:transform .8s cubic-bezier(.34,1.56,.64,1);transform-origin:50% 100%}
#oven-door.open{transform:rotateX(70deg)}
#oven-timer{font-size:2.5rem;font-weight:900;color:var(--brown)}
#oven-btn{
  padding:12px 32px;border:3px solid var(--brown);border-radius:12px;
  background:linear-gradient(135deg,#ffcc00,#ff9a00);
  color:var(--brown);font-family:'Jua',sans-serif;font-size:1.1rem;
  cursor:pointer;box-shadow:3px 3px 0 var(--brown);transition:all .15s;
}
#oven-btn:hover{transform:translateY(-2px);box-shadow:3px 5px 0 var(--brown)}
#oven-btn:disabled{background:#ccc;cursor:not-allowed;transform:none}

/* ══════════════════════════════
   STEP 7 – RESULT
══════════════════════════════ */
#result-stage{flex-direction:column;gap:20px}
.result-card{text-align:center}
.result-title{font-size:2rem;color:var(--brown);margin-bottom:8px}
.result-stars{font-size:2.5rem;letter-spacing:4px}
.result-msg{font-size:1rem;color:#888;margin-top:8px}
#restart-btn{
  padding:12px 40px;border:3px solid var(--brown);border-radius:12px;
  background:linear-gradient(135deg,var(--pink),var(--yellow));
  color:var(--brown);font-family:'Jua',sans-serif;font-size:1.1rem;
  cursor:pointer;box-shadow:3px 3px 0 var(--brown);transition:all .15s;
}
#restart-btn:hover{transform:translateY(-2px)}

/* ── NEXT BTN ── */
#next-btn{
  position:absolute;bottom:60px;right:24px;
  padding:10px 28px;border:3px solid var(--brown);border-radius:10px;
  background:linear-gradient(135deg,var(--mint),var(--blue,#c7e3ff));
  color:var(--brown);font-family:'Jua',sans-serif;font-size:1rem;
  cursor:pointer;box-shadow:3px 3px 0 var(--brown);transition:all .15s;
  opacity:0;pointer-events:none;z-index:40;
}
#next-btn.show{opacity:1;pointer-events:all}
#next-btn:hover{transform:translateY(-2px);box-shadow:3px 5px 0 var(--brown)}

/* ── TOAST ── */
#toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);
  background:#fff0f0;border:3px solid #ff6b6b;border-radius:10px;
  padding:8px 20px;font-size:.85rem;color:#c0392b;
  box-shadow:3px 3px 0 #ff6b6b;z-index:200;
  animation:toast-in .3s ease;display:none;
}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── BUBBLE ── */
.bubble{
  position:absolute;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.8),rgba(255,200,100,.3));
  animation:rise linear forwards;
}
@keyframes rise{from{transform:translateY(0) scale(1);opacity:.8}to{transform:translateY(-120px) scale(.3);opacity:0}}
</style>
</head>
<body>

<!-- HEADER -->
<header id="hdr">
  <div class="title">🍰 마들렌 마스터</div>
  <div class="steps" id="step-dots"></div>
</header>

<!-- SCENE -->
<div id="scene">
  <canvas id="fx-canvas"></canvas>

  <!-- ── STEP 1: FLOUR ── -->
  <div class="stage" id="stage-1">
    <!-- Flour Bag SVG -->
    <div id="bag-wrap">
      <svg width="140" height="180" viewBox="0 0 140 180">
        <!-- bag body -->
        <rect x="20" y="40" width="100" height="120" rx="14" fill="#f5e6c8" stroke="#c8a87a" stroke-width="3"/>
        <rect x="20" y="40" width="100" height="30" rx="8" fill="#e8c98a" stroke="#c8a87a" stroke-width="3"/>
        <!-- tie -->
        <ellipse cx="70" cy="40" rx="18" ry="8" fill="#c8a87a"/>
        <!-- label -->
        <rect x="32" y="84" width="76" height="56" rx="8" fill="#fff" stroke="#c8a87a" stroke-width="2"/>
        <text x="70" y="108" text-anchor="middle" font-size="11" fill="#8B6914" font-family="Jua,sans-serif">밀가루</text>
        <text x="70" y="126" text-anchor="middle" font-size="9" fill="#aaa" font-family="sans-serif">FLOUR 1kg</text>
        <!-- dots pattern -->
        <circle cx="40" cy="70" r="3" fill="#c8a87a" opacity=".5"/>
        <circle cx="70" cy="65" r="3" fill="#c8a87a" opacity=".5"/>
        <circle cx="100" cy="70" r="3" fill="#c8a87a" opacity=".5"/>
      </svg>
    </div>

    <div class="card" style="align-items:center">
      <!-- Bowl SVG -->
      <svg id="s1-bowl" width="200" height="160" viewBox="0 0 200 160">
        <!-- bowl shadow -->
        <ellipse cx="100" cy="150" rx="80" ry="8" fill="rgba(0,0,0,.08)"/>
        <!-- bowl body -->
        <path d="M20,60 Q20,140 100,145 Q180,140 180,60 Z" fill="#fffde7" stroke="#c8a87a" stroke-width="3"/>
        <!-- flour fill (starts empty) -->
        <clipPath id="bowl-clip"><path d="M20,60 Q20,140 100,145 Q180,140 180,60 Z"/></clipPath>
        <rect id="flour-fill" x="20" y="145" width="160" height="0" fill="url(#flour-grad)" clip-path="url(#bowl-clip)"/>
        <defs>
          <linearGradient id="flour-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fffde7"/>
            <stop offset="100%" stop-color="#f5e6c8"/>
          </linearGradient>
        </defs>
        <!-- bowl rim -->
        <ellipse cx="100" cy="60" rx="80" ry="14" fill="#f5e6c8" stroke="#c8a87a" stroke-width="3"/>
        <!-- bowl shine -->
        <ellipse cx="65" cy="95" rx="12" ry="6" fill="rgba(255,255,255,.4)" transform="rotate(-20,65,95)"/>
      </svg>
      <div style="font-size:.8rem;color:#888">믹싱볼</div>
    </div>
  </div>

  <!-- ── STEP 2: EGG ── -->
  <div class="stage" id="stage-2">
    <div class="card" style="gap:8px">
      <div style="font-size:.85rem;color:#888">달걀을 탭해서 깨세요!</div>
      <svg id="egg-wrap" width="120" height="150" viewBox="0 0 120 150">
        <!-- egg white -->
        <ellipse cx="60" cy="80" rx="44" ry="55" fill="#fff9f0" stroke="#e8d0a8" stroke-width="3"/>
        <!-- shine -->
        <ellipse cx="44" cy="55" rx="10" ry="14" fill="rgba(255,255,255,.6)" transform="rotate(-20,44,55)"/>
        <!-- crack lines (hidden) -->
        <g id="egg-crack-line">
          <polyline points="45,65 55,75 48,85 60,90 70,78 80,82" fill="none" stroke="#c8a87a" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        <!-- yolk group (falls down) -->
        <g id="yolk-group">
          <ellipse cx="60" cy="115" rx="22" ry="8" fill="rgba(255,200,50,.25)"/>
          <circle cx="60" cy="105" r="18" fill="#ffcc44" stroke="#ffaa00" stroke-width="2"/>
          <ellipse cx="53" cy="99" rx="5" ry="4" fill="rgba(255,255,255,.4)" transform="rotate(-15,53,99)"/>
        </g>
      </svg>
      <!-- Bowl below egg -->
      <svg width="160" height="80" viewBox="0 0 160 80">
        <path d="M10,20 Q10,75 80,78 Q150,75 150,20 Z" fill="#fffde7" stroke="#c8a87a" stroke-width="3"/>
        <ellipse cx="80" cy="20" rx="70" ry="12" fill="#f5e6c8" stroke="#c8a87a" stroke-width="3"/>
      </svg>
    </div>
  </div>

  <!-- ── STEP 3: BUTTER MELT ── -->
  <div class="stage" id="stage-3">
    <div class="card">
      <!-- Bain-marie pot -->
      <svg width="180" height="160" viewBox="0 0 180 160">
        <!-- outer pot -->
        <rect x="10" y="60" width="160" height="80" rx="12" fill="#c8dde8" stroke="#7aa0b8" stroke-width="3"/>
        <rect x="10" y="60" width="160" height="20" rx="8" fill="#9ab8cc" stroke="#7aa0b8" stroke-width="3"/>
        <!-- water ripples -->
        <ellipse cx="90" cy="72" rx="55" ry="6" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2"/>
        <!-- inner bowl -->
        <rect x="35" y="45" width="110" height="70" rx="10" fill="#fffde7" stroke="#c8a87a" stroke-width="2.5"/>
        <!-- butter solid -->
        <g id="butter-solid">
          <rect x="52" y="58" width="76" height="42" rx="8" fill="#ffe066" stroke="#ffcc00" stroke-width="2"/>
          <rect x="52" y="58" width="76" height="14" rx="6" fill="#ffd000"/>
          <text x="90" y="84" text-anchor="middle" font-size="10" fill="#c8960c" font-family="Jua,sans-serif">BUTTER</text>
        </g>
        <!-- butter melted (liquid) -->
        <g id="butter-liquid">
          <path d="M38,90 Q90,110 142,90 L142,110 Q90,118 38,110 Z" fill="#ffe066" opacity=".85"/>
          <ellipse cx="90" cy="90" rx="52" ry="8" fill="#ffd000" opacity=".7"/>
        </g>
        <!-- handle left -->
        <rect x="-2" y="85" width="16" height="10" rx="5" fill="#7aa0b8" stroke="#5a8098" stroke-width="2"/>
        <!-- handle right -->
        <rect x="166" y="85" width="16" height="10" rx="5" fill="#7aa0b8" stroke="#5a8098" stroke-width="2"/>
        <!-- flame -->
        <g id="flame-group">
          <ellipse cx="90" cy="148" rx="30" ry="6" fill="rgba(255,100,0,.15)"/>
          <path id="flame1" d="M75,145 Q72,130 80,120 Q82,135 90,128 Q92,135 100,120 Q108,130 105,145 Q95,138 90,145 Q85,138 75,145Z" fill="#ff6b00" opacity=".9"/>
          <path id="flame2" d="M80,145 Q79,133 85,125 Q87,133 90,128 Q93,133 95,125 Q101,133 100,145 Q95,140 90,143 Q85,140 80,145Z" fill="#ffd000" opacity=".8"/>
        </g>
      </svg>
      <div id="temp-label">🌡️ 0°C</div>
      <div id="mix-progress-bar" style="display:none"></div>
      <button id="heat-btn">🔥 가열 시작</button>
    </div>
    <!-- thermometer -->
    <div class="card" style="padding:16px 10px">
      <svg width="50" height="200" viewBox="0 0 50 200">
        <!-- scale -->
        <line x1="32" y1="20" x2="32" y2="160" stroke="#ddd" stroke-width="1"/>
        <text x="36" y="24"  font-size="8" fill="#888">80</text>
        <text x="36" y="59"  font-size="8" fill="#888">60</text>
        <text x="36" y="94"  font-size="8" fill="#888">40</text>
        <text x="36" y="129" font-size="8" fill="#888">20</text>
        <text x="36" y="164" font-size="8" fill="#888">0</text>
        <!-- tick marks -->
        <line x1="26" y1="20"  x2="30" y2="20"  stroke="#bbb" stroke-width="1"/>
        <line x1="26" y1="55"  x2="30" y2="55"  stroke="#bbb" stroke-width="1"/>
        <line x1="26" y1="90"  x2="30" y2="90"  stroke="#bbb" stroke-width="1"/>
        <line x1="26" y1="125" x2="30" y2="125" stroke="#bbb" stroke-width="1"/>
        <line x1="26" y1="160" x2="30" y2="160" stroke="#bbb" stroke-width="1"/>
        <!-- 40°C target line -->
        <line x1="18" y1="90" x2="30" y2="90" stroke="#ff6b35" stroke-width="2" stroke-dasharray="3,2"/>
        <text x="2" y="93" font-size="7" fill="#ff6b35">40°</text>
        <!-- tube -->
        <rect x="20" y="20" width="10" height="140" rx="5" fill="#f0f0f0" stroke="#ccc" stroke-width="1.5"/>
        <!-- mercury fill -->
        <rect id="thermo-fill" x="21" y="160" width="8" height="0" rx="3" fill="#ff4444"/>
        <!-- bulb -->
        <circle cx="25" cy="168" r="10" fill="#ff4444" stroke="#cc0000" stroke-width="1.5"/>
      </svg>
    </div>
  </div>

  <!-- ── STEP 4: WHISK ── -->
  <div class="stage" id="stage-4">
    <div class="card" style="position:relative;overflow:visible">
      <!-- Bowl with batter -->
      <svg id="whisk-bowl" width="240" height="180" viewBox="0 0 240 180">
        <ellipse cx="120" cy="168" rx="90" ry="10" fill="rgba(0,0,0,.07)"/>
        <path d="M30,70 Q30,160 120,165 Q210,160 210,70 Z" fill="#fffde7" stroke="#c8a87a" stroke-width="3"/>
        <!-- batter inside -->
        <clipPath id="w-clip"><path d="M30,70 Q30,160 120,165 Q210,160 210,70 Z"/></clipPath>
        <ellipse id="batter-surface" cx="120" cy="100" rx="80" ry="30" fill="#fff3b0" clip-path="url(#w-clip)" opacity=".9"/>
        <ellipse cx="120" cy="70" rx="90" ry="14" fill="#f5e6c8" stroke="#c8a87a" stroke-width="3"/>
        <!-- swirl lines (animate via JS) -->
        <g id="swirl-g" opacity="0">
          <path d="M90,100 Q120,80 150,100 Q130,120 110,105" fill="none" stroke="#ffcc44" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M100,115 Q120,95 140,115" fill="none" stroke="#ffcc44" stroke-width="2" stroke-linecap="round"/>
        </g>
      </svg>
      <!-- Whisk (draggable) -->
      <svg id="whisk-svg" width="80" height="160" viewBox="0 0 80 160"
           style="position:absolute;top:0;left:80px;z-index:20">
        <!-- handle -->
        <rect x="34" y="0" width="12" height="70" rx="6" fill="#a0785a" stroke="#7a5840" stroke-width="2"/>
        <!-- wires -->
        <path d="M40,68 Q28,100 22,130 Q30,135 40,132 Q50,135 58,130 Q52,100 40,68Z" fill="none" stroke="#c0a080" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M40,68 Q40,110 40,132" fill="none" stroke="#c0a080" stroke-width="2.5"/>
        <path d="M40,68 Q32,95 28,120" fill="none" stroke="#b89070" stroke-width="2"/>
        <path d="M40,68 Q48,95 52,120" fill="none" stroke="#b89070" stroke-width="2"/>
        <ellipse cx="40" cy="130" rx="18" ry="6" fill="none" stroke="#c0a080" stroke-width="2.5"/>
        <!-- grip rings -->
        <rect x="33" y="20" width="14" height="4" rx="2" fill="#8a6048"/>
        <rect x="33" y="35" width="14" height="4" rx="2" fill="#8a6048"/>
        <rect x="33" y="50" width="14" height="4" rx="2" fill="#8a6048"/>
      </svg>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="font-size:.85rem;color:var(--brown)">거품기를 빠르게 움직이세요!</div>
      <div id="mix-progress-bar">
        <div id="mix-fill"></div>
      </div>
      <div id="mix-pct" style="font-size:.8rem;color:#888">0%</div>
    </div>
  </div>

  <!-- ── STEP 5: PIPING ── -->
  <div class="stage" id="stage-5" style="flex-direction:column;gap:16px">
    <div style="font-size:.85rem;color:var(--brown);text-align:center">짤주머니를 팬 위에서 클릭해 반죽을 짜세요! (5개 채우기)</div>
    <div id="piping-scene" style="position:relative;display:inline-block">
      <!-- Madeleine Pan SVG -->
      <svg id="madeleine-pan" width="360" height="220" viewBox="0 0 360 220">
        <!-- pan body -->
        <rect x="10" y="40" width="340" height="160" rx="16" fill="#b0b8c8" stroke="#808898" stroke-width="3"/>
        <rect x="10" y="40" width="340" height="20" rx="8" fill="#9098a8" stroke="#808898" stroke-width="3"/>
        <!-- handle left -->
        <rect x="-16" y="108" width="30" height="14" rx="7" fill="#808898" stroke="#606878" stroke-width="2"/>
        <!-- handle right -->
        <rect x="346" y="108" width="30" height="14" rx="7" fill="#808898" stroke="#606878" stroke-width="2"/>
        <!-- cavities (5 shells) -->
        <g id="pan-cavities">
          <!-- cavity 0 -->
          <g data-cavity="0" class="cavity-g" style="cursor:pointer">

<script>
/* ═══════════════════════════════════════
   WEB AUDIO – sound effects (no files!)
═══════════════════════════════════════ */
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playPour(){
  // white-noise burst for flour pour
  const buf = AC.createBuffer(1,AC.sampleRate*.6,AC.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*.3;
  const src = AC.createBufferSource(); src.buffer=buf;
  const filt = AC.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=1200;
  const gain = AC.createGain(); gain.gain.setValueAtTime(.5,AC.currentTime); gain.gain.exponentialRampToValueAtTime(.01,AC.currentTime+.6);
  src.connect(filt); filt.connect(gain); gain.connect(AC.destination); src.start();
}
function playCrack(){
  const buf = AC.createBuffer(1,AC.sampleRate*.12,AC.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*.015));
  const src = AC.createBufferSource(); src.buffer=buf;
  const gain = AC.createGain(); gain.gain.value=.8;
  src.connect(gain); gain.connect(AC.destination); src.start();
}
function playBubble(){
  const osc = AC.createOscillator(); const gain = AC.createGain();
  osc.type='sine'; osc.frequency.setValueAtTime(400,AC.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200,AC.currentTime+.2);
  gain.gain.setValueAtTime(.3,AC.currentTime); gain.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.2);
  osc.connect(gain); gain.connect(AC.destination); osc.start(); osc.stop(AC.currentTime+.2);
}
function playWhisk(){
  const buf = AC.createBuffer(1,AC.sampleRate*.08,AC.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*.15;
  const src = AC.createBufferSource(); src.buffer=buf;
  const filt = AC.createBiquadFilter(); filt.type='highpass'; filt.frequency.value=2000;
  src.connect(filt); filt.connect(AC.destination); src.start();
}
function playPip(){
  const osc = AC.createOscillator(); const gain = AC.createGain();
  osc.type='sine'; osc.frequency.value=880;
  gain.gain.setValueAtTime(.2,AC.currentTime); gain.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.15);
  osc.connect(gain); gain.connect(AC.destination); osc.start(); osc.stop(AC.currentTime+.15);
}
function playDing(){
  [523,659,784].forEach((f,i)=>{
    const osc=AC.createOscillator(); const gain=AC.createGain();
    osc.type='triangle'; osc.frequency.value=f;
    const t=AC.currentTime+i*.08;
    gain.gain.setValueAtTime(.3,t); gain.gain.exponentialRampToValueAtTime(.001,t+.6);
    osc.connect(gain); gain.connect(AC.destination); osc.start(t); osc.stop(t+.6);
  });
}
function playOvenBeep(){
  [880,880,880].forEach((f,i)=>{
    const osc=AC.createOscillator(); const gain=AC.createGain();
    osc.type='square'; osc.frequency.value=f;
    const t=AC.currentTime+i*.4;
    gain.gain.setValueAtTime(.15,t); gain.gain.setValueAtTime(.001,t+.25);
    osc.connect(gain); gain.connect(AC.destination); osc.start(t); osc.stop(t+.25);
  });
}
function playSizzle(){
  const buf=AC.createBuffer(1,AC.sampleRate*.4,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*.2;
  const src=AC.createBufferSource(); src.buffer=buf;
  const filt=AC.createBiquadFilter(); filt.type='highpass'; filt.frequency.value=3000;
  const gain=AC.createGain(); gain.gain.setValueAtTime(.4,AC.currentTime); gain.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.4);
  src.connect(filt); filt.connect(gain); gain.connect(AC.destination); src.start();
}

/* ═══════════════════════════════════════
   PARTICLE CANVAS
═══════════════════════════════════════ */
const canvas = document.getElementById('fx-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas(){
  canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight;
}
window.addEventListener('resize',resizeCanvas); resizeCanvas();

function spawnFlour(x,y){
  for(let i=0;i<60;i++){
    particles.push({
      x,y, vx:(Math.random()-.5)*3, vy:Math.random()*4+2,
      r:Math.random()*5+2, life:1, type:'flour',
      rot:Math.random()*Math.PI*2
    });
  }
}
function spawnSplash(x,y){
  for(let i=0;i<20;i++){
    const ang=Math.random()*Math.PI;
    particles.push({
      x,y, vx:Math.cos(ang)*(Math.random()*4+1), vy:-Math.random()*5-2,
      r:Math.random()*4+2, life:1, type:'yolk'
    });
  }
}
function spawnPip(x,y){
  for(let i=0;i<12;i++){
    const ang=Math.random()*Math.PI*2;
    particles.push({
      x,y, vx:Math.cos(ang)*2, vy:Math.sin(ang)*2-1,
      r:Math.random()*5+3, life:1, type:'batter'
    });
  }
}
function spawnStar(x,y){
  for(let i=0;i<30;i++){
    const ang=(i/30)*Math.PI*2;
    particles.push({
      x,y, vx:Math.cos(ang)*5, vy:Math.sin(ang)*5,
      r:Math.random()*4+2, life:1, type:'star',
      col:`hsl(${Math.random()*60+30},90%,60%)`
    });
  }
}

function animParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>{
    p.vy+=0.15; p.x+=p.vx; p.y+=p.vy; p.life-=0.022;
    if(p.life<=0) return false;
    ctx.globalAlpha=p.life;
    if(p.type==='flour'){
      ctx.fillStyle='rgba(245,235,200,0.9)';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    } else if(p.type==='yolk'){
      ctx.fillStyle='#ffcc44';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    } else if(p.type==='batter'){
      ctx.fillStyle='#fff3b0';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    } else if(p.type==='star'){
      ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    return true;
  });
  requestAnimationFrame(animParticles);
}
animParticles();

/* ═══════════════════════════════════════
   GAME STATE
═══════════════════════════════════════ */
const STEPS=7;
let curStep=1;
const stepNames=['','밀가루 넣기','달걀 깨기','버터 중탕','반죽 섞기','팬닝하기','오븐에 굽기','완성!'];
const stepInstrs=[
  '',
  '🌾 밀가루 포대를 드래그해서 믹싱볼에 쏟으세요!',
  '🥚 달걀을 클릭해서 탁! 깨세요!',
  '🧈 버터를 40°C까지 중탕하세요!',
  '🌀 거품기를 빠르게 움직여 반죽을 섞으세요!',
  '🎂 짤주머니로 팬 구멍마다 반죽을 짜 넣으세요!',
  '🔥 오븐에 넣고 구우세요! (12분)',
  '🎉 마들렌 완성!'
];

function initDots(){
  const c=document.getElementById('step-dots');
  c.innerHTML='';
  const icons=['','🌾','🥚','🧈','🌀','🎂','🔥','🎉'];
  for(let i=1;i<=STEPS;i++){
    const d=document.createElement('div');
    d.className='step-dot';
    d.id=`dot-${i}`;
    d.textContent=icons[i];
    c.appendChild(d);
  }
}
function updateDots(){
  for(let i=1;i<=STEPS;i++){
    const d=document.getElementById(`dot-${i}`);
    d.classList.remove('done','active');
    if(i<curStep) d.classList.add('done');
    else if(i===curStep) d.classList.add('active');
  }
}
function showStage(n){
  document.querySelectorAll('.stage').forEach(s=>s.classList.remove('active'));
  const s=document.getElementById(`stage-${n}`);
  if(s) s.classList.add('active');
  document.getElementById('instr').textContent=stepInstrs[n];
}
function showNext(show=true){
  const b=document.getElementById('next-btn');
  if(show) b.classList.add('show'); else b.classList.remove('show');
}
function showToast(msg,dur=2000){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.display='none',dur);
}

document.getElementById('next-btn').addEventListener('click',()=>{
  if(curStep<STEPS){
    curStep++;
    updateDots();
    showStage(curStep);
    showNext(false);
    initStep(curStep);
  }
});
document.getElementById('restart-btn').addEventListener('click',()=>location.reload());

/* ═══════════════════════════════════════
   STEP INIT
═══════════════════════════════════════ */
function initStep(n){
  if(n===1) initFlour();
  if(n===2) initEgg();
  if(n===3) initButter();
  if(n===4) initWhisk();
  if(n===5) initPiping();
  if(n===6) initOven();
  if(n===7){ playDing(); showNext(false); }
}

/* ─── STEP 1: FLOUR ─── */
function initFlour(){
  const bag=document.getElementById('bag-wrap');
  const bowl=document.getElementById('s1-bowl');
  const fill=document.getElementById('flour-fill');
  let flourAmt=0; let dragging=false; let over=false;

  function getBowlRect(){ return bowl.getBoundingClientRect(); }
  function getBagRect() { return bag.getBoundingClientRect(); }

  bag.addEventListener('mousedown',e=>{ dragging=true; e.preventDefault(); });
  bag.addEventListener('touchstart',e=>{ dragging=true; e.preventDefault(); },{passive:false});

  function checkOver(cx,cy){
    const r=getBowlRect();
    return cx>r.left&&cx<r.right&&cy>r.top&&cy<r.bottom;
  }

  function onMove(cx,cy){
    if(!dragging) return;
    const wasOver=over;
    over=checkOver(cx,cy);
    if(over&&!wasOver&&flourAmt<100){
      // tilt bag
      bag.classList.remove('resetting');
      bag.classList.add('tilting');
      pourFlour();
    } else if(!over&&wasOver){
      bag.classList.remove('tilting');
      bag.classList.add('resetting');
      setTimeout(()=>bag.classList.remove('resetting'),600);
    }
  }

  document.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
  document.addEventListener('touchmove',e=>{
    const t=e.touches[0]; onMove(t.clientX,t.clientY);
  },{passive:true});
  document.addEventListener('mouseup',()=>{ dragging=false; over=false; });
  document.addEventListener('touchend',()=>{ dragging=false; over=false; });

  let pourInt=null;
  function pourFlour(){
    if(pourInt) return;
    playPour();
    pourInt=setInterval(()=>{
      if(!over||flourAmt>=100){ clearInterval(pourInt); pourInt=null; return; }
      flourAmt=Math.min(100,flourAmt+5);
      // animate fill rect: grows upward from bottom of bowl
      const maxH=70; const h=flourAmt/100*maxH;
      fill.setAttribute('y',145-h); fill.setAttribute('height',h);
      // particles
      const r=getBowlRect();
      spawnFlour(r.left+r.width/2,r.top+20);
    },80);
    // watch for done
    const chk=setInterval(()=>{
      if(flourAmt>=100){ clearInterval(chk); clearInterval(pourInt); pourInt=null;
        bag.classList.remove('tilting'); bag.classList.add('resetting');
        setTimeout(()=>bag.classList.remove('resetting'),600);
        showToast('✅ 밀가루를 다 넣었어요!');
        setTimeout(()=>showNext(true),600);
      }
    },100);
  }
}

/* ─── STEP 2: EGG ─── */
function initEgg(){
  const egg=document.getElementById('egg-wrap');
  const crack=document.getElementById('egg-crack-line');
  const yolk=document.getElementById('yolk-group');
  let clicks=0; let done=false;

  egg.addEventListener('click',()=>{
    if(done) return;
    if(AC.state==='suspended') AC.resume();
    clicks++;
    playCrack();
    if(clicks===1){
      crack.style.opacity='1';
      egg.style.transform='rotate(-8deg)';
      showToast('한 번 더 탁! 치세요!');
    } else if(clicks>=2){
      done=true;
      egg.style.transform='rotate(-25deg)';
      crack.style.opacity='1';
      // drop yolk
      yolk.style.opacity='1';
      yolk.style.transform='translateY(0)';
      // particles
      const r=egg.getBoundingClientRect();
      spawnSplash(r.left+r.width/2,r.top+r.height*.7);
      playSizzle();
      setTimeout(()=>{ showToast('🥚 달걀을 깼어요!'); showNext(true); },500);
    }
  });
}

/* ─── STEP 3: BUTTER ─── */
function initButter(){
  let temp=0; let heating=false; let done=false;
  const btn=document.getElementById('heat-btn');
  const label=document.getElementById('temp-label');
  const solid=document.getElementById('butter-solid');
  const liquid=document.getElementById('butter-liquid');
  const fill=document.getElementById('thermo-fill');
  const flames=[document.getElementById('flame1'),document.getElementById('flame2')];

  btn.addEventListener('click',()=>{
    if(heating||done) return;
    if(AC.state==='suspended') AC.resume();
    heating=true;
    btn.disabled=true;
    btn.textContent='🔥 가열 중...';
    let bubbleInt=setInterval(()=>playBubble(),800);

    const interval=setInterval(()=>{
      temp=Math.min(42,temp+.5);
      label.textContent=`🌡️ ${temp.toFixed(1)}°C`;
      // thermometer: 160px total height, 0°C→20°C at bottom, 80°C at top
      const h=Math.min(140,(temp/80)*140);
      fill.setAttribute('height',h);
      fill.setAttribute('y',160-h);
      fill.setAttribute('fill',temp>=40?'#ff6b35':'#ff4444');
      // butter melt
      if(temp>=20){ solid.style.opacity=Math.max(0,1-(temp-20)/20)+''; }
      if(temp>=30){ liquid.style.opacity=Math.min(1,(temp-30)/10)+''; }
      // flame flicker
      flames.forEach(f=>{f.setAttribute('opacity',(.7+Math.random()*.3)+'')});

      if(temp>=40){
        clearInterval(interval); clearInterval(bubbleInt);
        done=true; heating=false;
        label.textContent='🌡️ 40°C ✅';
        // bubbles on liquid
        for(let i=0;i<5;i++) setTimeout(()=>playBubble(),i*200);
        showToast('🧈 버터가 완벽하게 녹았어요!');
        setTimeout(()=>showNext(true),800);
      }
    },80);
  });
}

/* ─── STEP 4: WHISK ─── */
function initWhisk(){
  const whisk=document.getElementById('whisk-svg');
  const fillEl=document.getElementById('mix-fill');
  const pct=document.getElementById('mix-pct');
  const swirl=document.getElementById('swirl-g');
  let progress=0; let lastX=0,lastY=0; let moving=false; let done=false;
  let whisking=false;

  function onWhiskMove(cx,cy){
    if(done) return;
    if(AC.state==='suspended') AC.resume();
    const dx=cx-lastX, dy=cy-lastY;
    const speed=Math.sqrt(dx*dx+dy*dy);
    if(speed>5){
      if(!whisking){ whisking=true; whisk.classList.add('spinning'); }
      clearTimeout(whisk._st);
      whisk._st=setTimeout(()=>{ whisking=false; whisk.classList.remove('spinning'); },200);
      if(Math.random()<.3) playWhisk();
      progress=Math.min(100,progress+speed*.15);
      fillEl.style.width=progress+'%';
      pct.textContent=Math.floor(progress)+'%';
      swirl.style.opacity=Math.min(1,progress/50)+'';
      if(progress>=100&&!done){
        done=true;
        whisk.classList.remove('spinning');
        showToast('✅ 반죽 완성! 잘 섞었어요!');
        playDing();
        setTimeout(()=>showNext(true),600);
      }
    }
    lastX=cx; lastY=cy;
  }

  whisk.addEventListener('mousemove',e=>onWhiskMove(e.clientX,e.clientY));
  whisk.addEventListener('touchmove',e=>{
    const t=e.touches[0]; onWhiskMove(t.clientX,t.clientY);
  },{passive:true});

  // also track on bowl
  const bowl=document.getElementById('whisk-bowl');
  bowl.parentElement.addEventListener('mousemove',e=>onWhiskMove(e.clientX,e.clientY));
}

/* ─── STEP 5: PIPING ─── */
function initPiping(){
  const scene=document.getElementById('piping-scene');
  const bagEl=document.getElementById('piping-bag-el');
  const pan=document.getElementById('madeleine-pan');
  const countEl=document.getElementById('filled-count');
  let filled=0; let done=false;

  // Show piping bag, hide initially
  bagEl.style.display='block';
  bagEl.style.left='160px'; bagEl.style.top='20px';

  // Follow mouse over scene
  scene.style.cursor='none';
  function moveBag(cx,cy){
    const r=scene.getBoundingClientRect();
    bagEl.style.left=(cx-r.left-30)+'px';
    bagEl.style.top=(cy-r.top-80)+'px';
  }
  scene.addEventListener('mousemove',e=>moveBag(e.clientX,e.clientY));
  scene.addEventListener('touchmove',e=>{ const t=e.touches[0]; moveBag(t.clientX,t.clientY); },{passive:true});

  // Click cavities
  document.querySelectorAll('.cavity-g').forEach(g=>{
    g.addEventListener('click',e=>{
      if(done) return;
      if(AC.state==='suspended') AC.resume();
      const idx=parseInt(g.getAttribute('data-cavity'));
      const cav=document.getElementById(`cav-${idx}`);
      if(cav.classList.contains('filled-cav')) return;
      cav.classList.add('filled-cav');
      cav.setAttribute('fill','#fff3b0');
      // batter blob animation
      animPipBatter(cav, e.clientX, e.clientY);
      playPip();
      filled++;
      countEl.textContent=filled;
      if(filled>=4&&!done){
        done=true;
        scene.style.cursor='default';
        bagEl.style.display='none';
        showToast('🎂 팬닝 완료!');
        playDing();
        setTimeout(()=>showNext(true),700);
      }
    });
    g.addEventListener('touchend',e=>{
      if(done) return;
      if(AC.state==='suspended') AC.resume();
      const idx=parseInt(g.getAttribute('data-cavity'));
      const cav=document.getElementById(`cav-${idx}`);
      if(cav.classList.contains('filled-cav')) return;
      const t=e.changedTouches[0];
      cav.classList.add('filled-cav');
      cav.setAttribute('fill','#fff3b0');
      animPipBatter(cav, t.clientX, t.clientY);
      playPip();
      filled++;
      countEl.textContent=filled;
      if(filled>=4&&!done){
        done=true;
        scene.style.cursor='default';
        bagEl.style.display='none';
        showToast('🎂 팬닝 완료!');
        playDing();
        setTimeout(()=>showNext(true),700);
      }
    });
  });

  function animPipBatter(cav, cx, cy){
    const r=canvas.getBoundingClientRect();
    spawnPip(cx-r.left, cy-r.top);
    // add ribs to cavity
    const ns='http://www.w3.org/2000/svg';
    const cx2=parseFloat(cav.getAttribute('cx'));
    const cy2=parseFloat(cav.getAttribute('cy'));
    const pan2=document.getElementById('madeleine-pan');
    for(let i=-1;i<=1;i++){
      const line=document.createElementNS(ns,'line');
      line.setAttribute('x1',cx2+i*14); line.setAttribute('y1',cy2-40);
      line.setAttribute('x2',cx2+i*10); line.setAttribute('y2',cy2+40);
      line.setAttribute('stroke','#e8c07a'); line.setAttribute('stroke-width','1.5');
      pan2.appendChild(line);
    }
  }
}

/* ─── STEP 6: OVEN ─── */
function initOven(){
  const btn=document.getElementById('oven-btn');
  const timerEl=document.getElementById('oven-timer');
  const glow=document.getElementById('oven-glow');
  const madeleines=document.getElementById('oven-madeleines');
  let baking=false; let timeLeft=12*60; let done=false;

  btn.addEventListener('click',()=>{
    if(baking||done) return;
    if(AC.state==='suspended') AC.resume();
    baking=true;
    btn.disabled=true;
    btn.textContent='🔥 굽는 중...';

    // glow animation
    let glowDir=1; let glowVal=0;
    const glowInt=setInterval(()=>{
      glowVal+=glowDir*.02;
      if(glowVal>0.25||glowVal<0) glowDir*=-1;
      glow.setAttribute('opacity',glowVal+'');
    },50);

    // show madeleines fading in
    setTimeout(()=>madeleines.setAttribute('opacity','0.3'),1000);
    setTimeout(()=>madeleines.setAttribute('opacity','0.6'),4000);
    setTimeout(()=>madeleines.setAttribute('opacity','1'),8000);

    // bubble sounds while baking
    const bubInt=setInterval(()=>{ if(!done) playBubble(); },1500);

    // timer countdown (speed up for fun: 1 real second = 6 game seconds)
    const timerInt=setInterval(()=>{
      timeLeft-=6;
      if(timeLeft<=0){ timeLeft=0; }
      const m=Math.floor(timeLeft/60); const s=timeLeft%60;
      timerEl.textContent=`⏱️ ${m}:${String(s).padStart(2,'0')}`;
      if(timeLeft===0){
        clearInterval(timerInt); clearInterval(glowInt); clearInterval(bubInt);
        done=true; glow.setAttribute('opacity','0');
        playOvenBeep();
        madeleines.setAttribute('opacity','1');
        showToast('🎉 마들렌이 완성됐어요!',3000);
        // star particles
        const r=canvas.getBoundingClientRect();
        spawnStar(canvas.width/2,canvas.height/2);
        setTimeout(()=>{
          playDing();
          showNext(true);
        },1200);
      }
    },1000);
  });
}
